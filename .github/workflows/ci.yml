name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint + Type check
        run: npm run lint:all

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t itfix .

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://itfix.rootnode.cv
    steps:
      - name: Deploy to rndocker
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 192.168.88.14
          username: alex
          key: ${{ secrets.RNDOCKER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            bash /home/alex/projects/itfix/scripts/deploy.sh
