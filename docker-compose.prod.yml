# ============================================================
# ITfix — Production Docker Compose
# ============================================================
services:
  itfix:
    build:
      context: .
      dockerfile: Dockerfile
    image: itfix:latest
    container_name: itfix
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
